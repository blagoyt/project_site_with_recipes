<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cooking Recipes Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card p-4 shadow" style="max-width: 420px; width: 100%;">
            <h2 class="mb-3 text-center">Create an Account</h2>
            <p class="text-center text-muted">Register once and come back anytime.</p>
            <form id="registerForm">
                <div class="mb-3">
                    <label for="regUsername" class="form-label">Username</label>
                    <input type="text" class="form-control" id="regUsername" required>
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="mb-4">
                    <label for="regPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Register</button>
            </form>
            <div class="mt-3 text-center">
                <a href="login.html">Already have an account? Login</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Пренасочване към началната страница, ако потребителят вече е вписан
        if (isAuthenticated()) {
            window.location.href = 'index.html';
        }

        // Изпращане на данните за нова регистрация към PHP контейнера (порт 8000)
        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) return;

            try {
                const response = await fetch('http://localhost:8000/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'register', username, email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    setUser(data.username);
                    window.location.href = 'index.html';
                } else {
                    alert(data.message); // Извежда съобщение, ако например потребителското име вече е заето
                }
            } catch (err) {
                alert('Грешка при връзка с бекенд контейнера.');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
