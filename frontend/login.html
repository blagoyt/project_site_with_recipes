<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cooking Recipes Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card p-4 shadow" style="max-width: 420px; width: 100%;">
            <h2 class="mb-3 text-center">Welcome Back</h2>
            <p class="text-center text-muted">Login to continue, or continue as a guest.</p>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <div class="d-flex justify-content-between mt-3">
                <a href="register.html">Create an account</a>
                <button id="guestBtn" class="btn btn-outline-secondary btn-sm">Continue as Guest</button>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        // Пренасочване към началната страница, ако потребителят вече е вписан
        if (isAuthenticated()) {
            window.location.href = 'index.html';
        }

        // Изпращане на данните към PHP контейнера (порт 8000)
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) return;

            try {
                const response = await fetch('http://localhost:8000/auth.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'login', username, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    setUser(data.username);
                    window.location.href = 'index.html';
                } else {
                    alert(data.message); // Извежда съобщение от базата данни за грешна парола/потребител
                }
            } catch (err) {
                alert('Грешка при връзка с бекенд контейнера.');
            }
        });

        // Вход като гост
        document.getElementById('guestBtn').addEventListener('click', () => {
            setUser('Guest');
            window.location.href = 'index.html';
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
